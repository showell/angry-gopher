<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>elm-lynrummy — board view</title>
<style>
  body { margin: 0; }
</style>
</head>
<body>
<div id="root"></div>
<script src="elm.js"></script>
<script>
  const app = Elm.Main.init({ node: document.getElementById("root") });
  app.ports.logTrial.subscribe(function (data) {
    fetch("http://localhost:8811/trial", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data),
    }).catch(function (err) { console.error("study-sink failed", err); });
  });
</script>
</body>
</html>
