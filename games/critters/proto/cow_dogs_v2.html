<!DOCTYPE html>
<!--
  cow_dogs_v2.html — indirect-manipulation prototype for the
  cow herding study. The human drags the dog; cows flee when
  the dog is within their influence radius; fences clamp cows
  at the canvas boundary.

  Design parallel: the cows are the "register", the dog is the
  "opcode" (vocabulary for mutating cow state). See
  ~/showell_repos/angry-gopher/showell/claude_writings/phase_not_motion.md
  and the Writing the Sidecars essay for the indirection frame.

  First iteration: one dog, three cows, no pasture yet, no
  commands (drag is the whole vocabulary).
-->
<html>
<head>
<meta charset="utf-8">
<title>Cow study V2 — drag the dog, watch the cows</title>
<style>
  body { font-family: system-ui, sans-serif; padding: 1.5em; max-width: 960px; color: #222; }
  h1 { font-size: 1.3em; margin-bottom: 0.2em; }
  .subtitle { color: #666; margin: 0 0 1em 0; font-size: 0.9em; line-height: 1.5; }

  #stage {
    width: 900px;
    height: 500px;
    border: 3px solid #8b6b3a;
    background: #f5efdd;
    position: relative;
    user-select: none;
    overflow: hidden;
    box-shadow: inset 0 0 12px rgba(139, 107, 58, 0.2);
  }

  .critter {
    position: absolute;
    font-size: 48px;
    line-height: 1;
    width: 48px; height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    pointer-events: none;
  }
  .dog {
    cursor: grab;
    pointer-events: auto;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.25));
  }
  .dog.dragging { cursor: grabbing; }

  .debug {
    margin-top: 0.5em;
    font-size: 0.8em;
    color: #888;
    font-family: ui-monospace, monospace;
  }
</style>
</head>
<body>

<h1>Cow study V2 &mdash; drag the dog</h1>
<p class="subtitle">
  Drag the 🐕. Cows flee when the dog gets within their influence radius (120px).
  Get close enough to bump and the cow picks up momentum — it keeps sliding even
  after the dog backs off, slowing down with friction. Three cows, no pasture yet.
</p>

<div id="stage"></div>
<div class="debug" id="debug"></div>

<script>
const STAGE_W        = 900;
const STAGE_H        = 500;
const COW_EMOJI      = "\u{1F404}";  // 🐄
const DOG_EMOJI      = "\u{1F415}";  // 🐕
const COW_COUNT      = 3;
const CRITTER_SIZE   = 48;
const HALF           = CRITTER_SIZE / 2;
const MARGIN_FROM_EDGE = HALF + 6;

// --- Physics constants (iteration 2: pressure + bump + momentum) ---
// Pressure (dog inside cow's influence radius): an acceleration
// whose magnitude falls off linearly with distance.
const INFLUENCE_R     = 120;   // px; cow "sees" the dog within this
const PRESSURE_ACCEL  = 0.08;  // per-frame accel at d=0

// Bump (dog close enough to physically collide): an extra impulse
// layered on top of pressure. Tapers to 0 at BUMP_DIST.
const BUMP_DIST       = 44;    // px; touching distance (< critter_size)
const BUMP_ACCEL      = 0.18;  // extra per-frame accel at d=0

// Friction: velocity multiplier per frame. 0.96 = 4% loss/frame.
// Post-bump motion decays to near-zero over ~1.5-2 seconds.
const FRICTION        = 0.96;

const MIN_COW_DOG_GAP  = INFLUENCE_R * 1.3;

const stage = document.getElementById("stage");
const debug = document.getElementById("debug");

// State
let dog = { x: STAGE_W / 2, y: STAGE_H / 2 };
let cows = [];
let dragging = false;
let dragOffset = { x: 0, y: 0 };

function dist(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  return Math.sqrt(dx * dx + dy * dy);
}

function clamp(v, lo, hi) {
  return Math.max(lo, Math.min(hi, v));
}

function initCows() {
  cows = [];
  let safety = 0;
  while (cows.length < COW_COUNT && safety < 200) {
    safety++;
    const pos = {
      x: MARGIN_FROM_EDGE + Math.random() * (STAGE_W - MARGIN_FROM_EDGE * 2),
      y: MARGIN_FROM_EDGE + Math.random() * (STAGE_H - MARGIN_FROM_EDGE * 2),
    };
    if (dist(pos, dog) < MIN_COW_DOG_GAP) continue;
    let tooCloseToCow = false;
    for (const c of cows) {
      if (dist(pos, c) < CRITTER_SIZE * 1.5) { tooCloseToCow = true; break; }
    }
    if (tooCloseToCow) continue;
    cows.push({ x: pos.x, y: pos.y, vx: 0, vy: 0 });
  }
}

function build() {
  stage.innerHTML = "";
  cows.forEach((c, i) => {
    const el = document.createElement("div");
    el.className = "critter cow";
    el.id = "cow-" + i;
    el.textContent = COW_EMOJI;
    stage.appendChild(el);
  });
  const dogEl = document.createElement("div");
  dogEl.className = "critter dog";
  dogEl.id = "dog";
  dogEl.textContent = DOG_EMOJI;
  stage.appendChild(dogEl);

  dogEl.addEventListener("mousedown", (e) => {
    const rect = dogEl.getBoundingClientRect();
    dragOffset.x = (e.clientX - rect.left) - HALF;
    dragOffset.y = (e.clientY - rect.top)  - HALF;
    dragging = true;
    dogEl.classList.add("dragging");
    e.preventDefault();
  });
}

window.addEventListener("mousemove", (e) => {
  if (!dragging) return;
  const rect = stage.getBoundingClientRect();
  const rx = e.clientX - rect.left - dragOffset.x;
  const ry = e.clientY - rect.top  - dragOffset.y;
  dog.x = clamp(rx, HALF, STAGE_W - HALF);
  dog.y = clamp(ry, HALF, STAGE_H - HALF);
});

window.addEventListener("mouseup", () => {
  if (!dragging) return;
  dragging = false;
  const dogEl = document.getElementById("dog");
  if (dogEl) dogEl.classList.remove("dragging");
});

function step() {
  // Velocity-based physics. Pressure and bump accelerate the cow;
  // friction decays velocity every frame; position integrates.
  cows.forEach(cow => {
    const d = dist(cow, dog);
    if (d > 0 && d < INFLUENCE_R) {
      const ux = (cow.x - dog.x) / d;
      const uy = (cow.y - dog.y) / d;
      const pressureMag = PRESSURE_ACCEL * (1 - d / INFLUENCE_R);
      cow.vx += ux * pressureMag;
      cow.vy += uy * pressureMag;
      if (d < BUMP_DIST) {
        const bumpMag = BUMP_ACCEL * (1 - d / BUMP_DIST);
        cow.vx += ux * bumpMag;
        cow.vy += uy * bumpMag;
      }
    }
    // Integrate position from velocity, then decay velocity.
    cow.x += cow.vx;
    cow.y += cow.vy;
    cow.vx *= FRICTION;
    cow.vy *= FRICTION;
    // Wall clamp — zero out the perpendicular velocity component
    // so a cow pinned against a fence doesn't keep trying to push.
    if (cow.x < HALF) { cow.x = HALF; cow.vx = 0; }
    if (cow.x > STAGE_W - HALF) { cow.x = STAGE_W - HALF; cow.vx = 0; }
    if (cow.y < HALF) { cow.y = HALF; cow.vy = 0; }
    if (cow.y > STAGE_H - HALF) { cow.y = STAGE_H - HALF; cow.vy = 0; }
  });

  // Render positions.
  cows.forEach((c, i) => {
    const el = document.getElementById("cow-" + i);
    if (el) {
      el.style.left = (c.x - HALF) + "px";
      el.style.top  = (c.y - HALF) + "px";
    }
  });
  const dogEl = document.getElementById("dog");
  if (dogEl) {
    dogEl.style.left = (dog.x - HALF) + "px";
    dogEl.style.top  = (dog.y - HALF) + "px";
  }

  // Debug line — helpful while iterating on feel.
  const speeds = cows.map(c => Math.sqrt(c.vx * c.vx + c.vy * c.vy).toFixed(2)).join(", ");
  debug.textContent = `cow speeds: [${speeds}] px/frame`;

  requestAnimationFrame(step);
}

initCows();
build();
step();
</script>

</body>
</html>
